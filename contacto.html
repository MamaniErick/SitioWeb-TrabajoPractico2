<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contaco|Mega Turismo</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <div class="logo">Mega Turismo</div>
        <nav>
            <ul class="menu">
                <!-- Mega-Menú -->
                <li class="mega-menu">
                    <a href="#">☰ MENÚ</a>
                    <div class="mega-content">      
                        <a href="index.html">INICIO</a>                      
                        <a href="destinos.html">Destinos</a>
                        <a href="agencias.html">Agencias</a>
                        <a href="precios.html">Precios</a>
                        <a href="blog.html">Blog</a>
                    </div>
                </li>
            </ul>
        </nav>        
    </header>
    
    <!--BANNER-->
    <section class="banner-pagina">
        <h1>Contáctanos</h1>
        <p>Estamos aquí para ayudarte a planificar tu próximo viaje</p>
    </section>

    <!--FORMULARIO-->
    <main class="contacto contenedor">
        <h2 class="titulo-seccion">Envíanos un Mensaje</h2>

        <form class="formulario" action="#modal-confirmacion">
            
            <div class="campo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
            </div>

            <div class="campo">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
            </div>

            <div class="campo">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" pattern="[0-9]{10}" placeholder="Ej: 3881234567">
            </div>

            <div class="campo">
                <label for="destino">Destino de Interés</label>
                <select id="destino" name="destino" required>
                    <option value="">Seleccione un destino</option>
                    <option>Purmamarca</option>
                    <option>Salinas Grandes</option>
                    <option>Valle de la Luna</option>
                    <option>Hornocal</option>
                </select>
            </div>

            <div class="campo campo-completo">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" required placeholder="Escribe tu consulta..."></textarea>
            </div>

            <button type="submit" class="btn-enviar">
                Enviar Mensaje
                <span class="spinner"></span>
            </button>
        </form>
    </main>

    <div id="modal-confirmacion" class="modal">
        <div class="modal-contenido">
            <h3>¡Mensaje Enviado!</h3>
            <p>Nos pondremos en contacto contigo pronto.</p>
            <a href="contacto.html" class="btn-cerrar">Cerrar</a>
        </div>
    </div>
    <!--FOOTER-->
    <footer class="footer-bottom">
        <p>&copy; 2026 Mega Turismo. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
